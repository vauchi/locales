# typos source code spell checker configuration
# Non-English locale files contain correct foreign words that the
# English spell checker flags as typos (e.g. German "Alle", French "Termine")

[files]
extend-exclude = [
    "de.json",
    "fr.json",
    "es.json",
    "it.json",
]
