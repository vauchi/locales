include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/reuse.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'

stages:
  - lint
  - validate
  - contract
  - trigger
  - deploy

# Validate JSON syntax (fast gate — catches malformed files before Python)
lint:json:
  stage: lint
  tags:
    - self-hosted
    - node
  needs: []
  script:
    - |
      ERRORS=0
      for file in *.json; do
        if ! jq empty "$file" 2>/dev/null; then
          echo "ERROR: Invalid JSON in $file"
          ERRORS=$((ERRORS + 1))
        fi
      done
      if [ $ERRORS -gt 0 ]; then
        echo "Found $ERRORS invalid JSON file(s)."
        exit 1
      fi
      echo "All JSON files are valid."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"

# Verify all strings are NFC-normalized (cross-platform consistency)
lint:unicode-nfc:
  stage: lint
  tags:
    - self-hosted
    - node
  needs: []
  script:
    - python3 scripts/check-nfc.py *.json
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"
        - "scripts/check-nfc.py"
    - if: $CI_COMMIT_BRANCH == "main"

validate:locales:
  stage: validate
  tags:
    - self-hosted
    - node
  needs:
    - job: lint:json
      optional: true
  script:
    - python3 scripts/validate.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"
        - scripts/validate.py

validate:translations:
  stage: validate
  tags:
    - self-hosted
    - node
  needs:
    - job: lint:json
      optional: true
  script:
    - python3 scripts/validate-translations.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"
        - scripts/validate-translations.py

validate:locales-strict:
  stage: validate
  tags:
    - self-hosted
    - node
  needs:
    - job: lint:json
      optional: true
  script:
    - python3 scripts/validate.py --strict
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"
  allow_failure: false

validate:schema:
  stage: validate
  tags:
    - self-hosted
    - node
  needs:
    - job: lint:json
      optional: true
  script:
    - uv pip install --system --quiet jsonschema 2>/dev/null || pip install jsonschema --quiet 2>/dev/null || true
    - python3 scripts/validate-schema.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"
        - locales.schema.json
        - scripts/validate-schema.py

# Check schema backward compatibility (detects breaking changes vs main)
# allow_failure: pre-v1.0, new required keys are frequent and intentional
check:schema-compat:
  stage: contract
  tags:
    - self-hosted
    - node
  needs:
    - job: validate:schema
      optional: true
  script:
    - git fetch origin main --depth=1
    - python3 scripts/check-schema-compat.py --baseline main
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - locales.schema.json

# ============================================================
# Trigger Stage — Cross-Project Contract Validation (C4)
# ============================================================

# When locale files merge to main, trigger core's contract tests
# to verify core's i18n parser still accepts the new content.
trigger:core-validate:
  stage: trigger
  needs:
    - job: validate:locales-strict
      optional: true
  trigger:
    project: vauchi/core
    strategy: depend
  variables:
    CONTENT_TRIGGER_REPO: locales
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "*.json"
        - locales.schema.json

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
