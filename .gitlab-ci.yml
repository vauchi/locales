stages:
  - validate

validate-locales:
  stage: validate
  image: python:3.12-slim
  script:
    - python3 scripts/validate.py
  rules:
    - changes:
        - "*.json"
        - scripts/validate.py

validate-locales-strict:
  stage: validate
  image: python:3.12-slim
  script:
    - python3 scripts/validate.py --strict
  rules:
    - if: $CI_MERGE_REQUEST_ID
      changes:
        - "*.json"
  allow_failure: false
