include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/reuse.yml'
      - '/ci-templates/badges.yml'

stages:
  - lint
  - validate
  - contract
  - deploy

# Validate JSON syntax (fast gate — catches malformed files before Python)
lint:json:
  stage: lint
  tags:
    - self-hosted
    - node
  needs: []
  script:
    - |
      ERRORS=0
      for file in *.json; do
        if ! jq empty "$file" 2>/dev/null; then
          echo "ERROR: Invalid JSON in $file"
          ERRORS=$((ERRORS + 1))
        fi
      done
      if [ $ERRORS -gt 0 ]; then
        echo "Found $ERRORS invalid JSON file(s)."
        exit 1
      fi
      echo "All JSON files are valid."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"

validate-locales:
  stage: validate
  tags:
    - self-hosted
    - node
  needs:
    - job: lint:json
      optional: true
  script:
    - python3 scripts/validate.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"
        - scripts/validate.py

validate-translations:
  stage: validate
  tags:
    - self-hosted
    - node
  needs:
    - job: lint:json
      optional: true
  script:
    - python3 scripts/validate-translations.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"
        - scripts/validate-translations.py

validate-locales-strict:
  stage: validate
  tags:
    - self-hosted
    - node
  needs:
    - job: lint:json
      optional: true
  script:
    - python3 scripts/validate.py --strict
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"
  allow_failure: false

validate-schema:
  stage: validate
  tags:
    - self-hosted
    - node
  needs:
    - job: lint:json
      optional: true
  script:
    - pip install jsonschema --quiet 2>/dev/null || true
    - python3 scripts/validate-schema.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.json"
        - locales.schema.json
        - scripts/validate-schema.py

# Check schema backward compatibility (detects breaking changes vs main)
# allow_failure: pre-v1.0, new required keys are frequent and intentional
check-schema-compat:
  stage: contract
  tags:
    - self-hosted
    - node
  needs:
    - job: validate-schema
      optional: true
  script:
    - git fetch origin main --depth=1
    - python3 scripts/check-schema-compat.py --baseline main
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - locales.schema.json

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages
